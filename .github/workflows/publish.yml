name: Build and Publish

# OIDC trusted publishing to npm (no token required)
permissions:
  contents: read
  id-token: write

# INFO: Run workflow on changes to the sdks
on:
  push:
  workflow_dispatch:

jobs:
    build:
        name: Build
        runs-on: ubuntu-latest
        if: startsWith(github.event.head_commit.message, 'release')
        steps:
            - uses: actions/checkout@v4
            - name: Setup Bun
              uses: oven-sh/setup-bun@v1
              with:
                  bun-version: latest
            - name: Setup Node (for npm publish via OIDC)
              uses: actions/setup-node@v4
              with:
                  node-version: '22.18.0'
                  registry-url: 'https://registry.npmjs.org'
            - name: Upgrade npm to >=11.5.1 (required for trusted publishing)
              run: npm install -g npm@11.5.1 && hash -r
            - name: Install dependencies
              run: bun install
            - name: Build package
              run: bun run build
            - name: Debug npm version
              run: npm --version
            - name: Publish 🎉
              # --tag latest forces dist-tag bypassing semver max-version check
              # (orphan 6.0.1 on registry would otherwise block latest assignment)
              run: npm publish --provenance --access public --tag latest
